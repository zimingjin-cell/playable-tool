<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>试玩 HTML 检测修改工具</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #657387;
      --line: #d8e1ee;
      --accent: #1d6fd4;
      --accent-dark: #1559ad;
      --ok: #147a4a;
      --warn: #936100;
      --bad: #a33131;
      --soft: #f8fbff;
      --shadow: 0 16px 38px rgba(24, 39, 75, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 18px 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .version {
      color: var(--muted);
      white-space: nowrap;
    }

    .guide-link {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .guide-link:hover {
      border-color: var(--accent);
      background: #f3f7ff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, .95fr) minmax(420px, 1.05fr);
      gap: 14px;
      align-items: start;
    }

    .layout > .panel:nth-child(3) {
      grid-column: 1 / -1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .layout > .panel:nth-child(1),
    .layout > .panel:nth-child(2) {
      min-height: 560px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .panel-body {
      padding: 16px;
      min-height: 0;
      overflow: visible;
    }

    .layout > .panel:nth-child(3) .panel-body {
      display: block;
      overflow: visible;
    }

    .dropzone {
      height: 250px;
      border: 2px dashed #b8c6d9;
      background: #fbfdff;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      transition: border-color .15s ease, background .15s ease;
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: #eef6ff;
    }

    .drop-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      border: 1px solid #cbd7e8;
      border-radius: 8px;
      color: var(--accent);
      background: #fff;
    }

    .drop-icon svg {
      width: 28px;
      height: 28px;
    }

    .drop-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .drop-text {
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 16px;
    }

    button, .file-button, a.download {
      appearance: none;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      line-height: 1;
      padding: 10px 13px;
      min-height: 38px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover, .file-button:hover, a.download:hover {
      background: var(--accent-dark);
    }

    .file-button,
    .file-button:visited,
    .file-button span {
      color: #fff;
    }

    label.file-button {
      color: #fff !important;
    }

    button.secondary {
      background: #eef2f8;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e2e9f3;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    input[type="file"] { display: none; }

    .file-list, .result-list, .detect-list {
      display: grid;
      gap: 10px;
    }

    .detect-list {
      max-height: 100%;
      overflow: auto;
      padding-right: 4px;
    }

    .result-list {
      margin-top: 14px;
      padding-right: 4px;
    }

    .preview-panel {
      --preview-w: 405px;
      --preview-h: 720px;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      overflow: hidden;
    }

    .preview-panel.landscape {
      --preview-w: 960px;
      --preview-h: 540px;
    }

    .preview-panel.fit {
      --preview-w: 100%;
      --preview-h: 720px;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      flex-wrap: wrap;
    }

    .preview-title {
      flex: 1 1 260px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .preview-tools button {
      min-height: 34px;
      padding: 8px 10px;
    }

    .preview-tools button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .preview-stage {
      display: grid;
      place-items: center;
      min-height: clamp(360px, 52vh, 620px);
      padding: 18px;
      background: #e8eef7;
      overflow: auto;
    }

    .preview-frame {
      display: block;
      width: min(var(--preview-w), 100%);
      height: min(var(--preview-h), 62vh);
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      box-shadow: 0 14px 30px rgba(24, 39, 75, .18);
    }

    .preview-frame[hidden],
    .preview-empty[hidden] {
      display: none !important;
    }

    .preview-empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    .preview-modal[hidden] {
      display: none !important;
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: rgba(15, 23, 42, .72);
      backdrop-filter: blur(3px);
    }

    .modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      min-width: 180px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
    }

    .modal-controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .modal-controls input[type="range"] {
      width: 150px;
    }

    .modal-stage {
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 18px;
    }

    .modal-frame {
      width: min(var(--modal-preview-w, 430px), calc(100vw - 56px));
      height: min(var(--modal-preview-h, 760px), calc(100vh - 112px));
      border: 0;
      border-radius: 0;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .34);
    }

    .file-card, .result-card, .detect-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 12px;
    }

    .file-name {
      font-weight: 700;
      overflow-wrap: anywhere;
      margin-bottom: 6px;
    }

    .meta {
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .detect-card {
      background: #fff;
      height: 104px;
      overflow: auto;
    }

    .detect-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .detect-title {
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e9f7ef;
      color: var(--ok);
      white-space: nowrap;
    }

    .badge.warn {
      background: #fff5dd;
      color: var(--warn);
    }

    .badge.bad {
      background: #fdecec;
      color: var(--bad);
    }

    .badge.neutral {
      background: #edf3fb;
      color: var(--muted);
    }

    .detail {
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
      overflow: visible;
      padding-right: 4px;
    }

    .settings-shell {
      display: grid;
      gap: 12px;
    }

    .settings-tabs {
      display: flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      overflow-x: auto;
    }

    .settings-tab {
      background: transparent;
      color: var(--ink);
      border: 1px solid transparent;
      min-height: 36px;
      padding: 9px 14px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .settings-tab:hover {
      background: #eaf1fb;
    }

    .settings-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .settings-panel {
      display: none;
    }

    .settings-panel.active {
      display: block;
    }

    .option {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-height: 90px;
    }

    .option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 1px 0 0;
      accent-color: var(--accent);
    }

    .option strong {
      display: block;
      margin-bottom: 4px;
    }

    .option span {
      color: var(--muted);
      line-height: 1.45;
    }

    .option-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: visible;
    }

    .text-card {
      min-height: 0;
    }

    .text-card > .option:first-child {
      min-height: 58px;
    }

    .text-card .language-panel {
      margin-top: -6px;
    }

    .option-card .option {
      border: 0;
      border-radius: 0;
      padding: 0;
      min-height: 0;
      background: transparent;
      flex: 0 0 auto;
    }

    .option-card .option + .option {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .control-box {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      display: grid;
      gap: 11px;
      min-height: 90px;
    }

    .operation-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 12px;
      display: grid;
      gap: 12px;
      flex: 0 0 auto;
      margin-top: 2px;
      min-width: 0;
    }

    .operation-panel .option {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .operation-panel .option:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .control-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .text-card .control-row {
      grid-template-columns: 96px minmax(0, 1fr);
      align-items: start;
    }

    .control-row.checkbox-row {
      grid-template-columns: 96px 24px;
      align-items: center;
      justify-content: start;
    }

    .control-row.checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
    }

    .control-row label {
      color: var(--muted);
      font-weight: 700;
    }

    input[type="color"] {
      width: 54px;
      height: 38px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      min-width: 0;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
      max-width: 100%;
      background: #fff;
    }

    .segmented label {
      color: var(--ink);
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      border-left: 1px solid var(--line);
    }

    .segmented label:first-child {
      border-left: 0;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label:has(input:checked) {
      background: var(--accent);
      color: #fff;
    }

    .texture-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .mode-panel {
      display: none;
    }

    .mode-panel.active {
      display: grid;
      gap: 11px;
    }

    .texture-name {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .preview {
      width: 96px;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #dcecf4;
      background-position: center;
      background-size: cover;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .log {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      color: var(--muted);
      line-height: 1.55;
      height: 150px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .file-list {
      max-height: 86px;
      overflow: auto;
      padding-right: 4px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-left {
        width: 100%;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button {
        flex: 1 1 160px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="topbar-left">
      <h1>试玩 HTML 检测修改工具</h1>
      <a class="guide-link" href="https://docs.google.com/document/d/1k_H63zH0p-ZkBSVhY3bbEETz-o_73RUMMH0M6V21fGA/edit?tab=t.0" target="_blank" rel="noopener noreferrer">使用说明</a>
      </div>
      <div class="version">Ray · v1.1.0 · 先检测，再修改 · 本地处理</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>1. 导入文件</h2>
          <button class="secondary" id="clearBtn" type="button">清空</button>
        </div>
        <div class="panel-body">
          <div class="dropzone" id="dropzone">
            <div>
              <div class="drop-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 3v12"></path>
                  <path d="m7 10 5 5 5-5"></path>
                  <path d="M5 21h14"></path>
                </svg>
              </div>
              <div class="drop-title">拖入 playable HTML</div>
              <div class="drop-text">工具会先扫描能改的地方，再让你选择具体修改项。</div>
              <label class="file-button" for="fileInput">选择 HTML</label>
              <input id="fileInput" type="file" accept=".html,.htm,text/html" multiple>
            </div>
          </div>

          <div id="fileList" class="file-list" style="margin-top:12px">
            <div class="file-card">
              <div class="meta">还没有导入文件。</div>
            </div>
          </div>

          <div id="log" class="log">等待文件。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>2. 检测结果</h2>
          <span class="badge neutral" id="detectCount">0 项</span>
        </div>
        <div class="panel-body">
          <div id="detectList" class="detect-list">
            <div class="detect-card">
              <div class="detail">导入 HTML 后，这里会显示跳转、次数、背景、文案/语言等可修改点。</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>3. 选择修改</h2>
          <span class="badge neutral">应用到全部文件</span>
        </div>
        <div class="panel-body">
          <div class="settings-shell">
            <div class="settings-tabs" role="tablist" aria-label="修改分类">
              <button class="settings-tab active" type="button" data-settings-tab="basic">基础设置</button>
              <button class="settings-tab" type="button" data-settings-tab="background">背景</button>
              <button class="settings-tab" type="button" data-settings-tab="text">文案/语言</button>
            </div>
            <div class="settings">
              <div class="settings-panel active" data-settings-panel="basic">
                <div class="option-card">
              <label class="option">
                <input id="optRedirect" type="checkbox" checked>
                <span><strong>关闭跳转平台</strong>拦截 `window.open`、`mraid.open`、`OpenStore`、`InstallFullGame`。</span>
              </label>
              <label class="option">
                <input id="optCounters" type="checkbox" checked>
                <span><strong>延长试玩次数</strong>把常见步数、操作次数、完成次数、闲置时间调到很大。</span>
              </label>
              <label class="option">
                <input id="optStoreLinks" type="checkbox">
                <span><strong>清空商店链接</strong>把 `iosLink` / `androidLink` 改成 `about:blank`，遇到顽固跳转再勾。</span>
              </label>
                </div>
              </div>

              <div class="settings-panel" data-settings-panel="background">
                <div class="option-card">
              <label class="option">
                <input id="optBackground" type="checkbox">
                <span><strong>背景：更换背景</strong>先改 HTML/相机背景；如果检测到可能是场景背景材质，也可以启用贴图替换尝试。</span>
              </label>
              <div class="operation-panel">
                <div class="control-row">
                  <label>背景类型</label>
                  <div class="segmented">
                    <label><input type="radio" name="bgMode" value="color" checked>纯色</label>
                    <label><input type="radio" name="bgMode" value="texture">图片材质</label>
                  </div>
                </div>
                <div class="mode-panel active" id="bgColorPanel">
                  <div class="control-row">
                    <label for="bgColor">背景颜色</label>
                    <input id="bgColor" type="color" value="#dcecf4">
                  </div>
                </div>
                <div class="mode-panel" id="bgTexturePanel">
                  <div class="control-row">
                    <label>背景图片</label>
                    <div class="texture-line">
                      <label class="file-button" for="textureInput">选择图片</label>
                      <input id="textureInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
                      <span class="texture-name" id="textureName">未选择</span>
                      <div class="preview" id="bgPreview"></div>
                    </div>
                  </div>
                </div>
              </div>
              <label class="option">
                <input id="optTextureReplace" type="checkbox">
                <span><strong>强制替换疑似背景贴图</strong>用于背景是场景材质/资源包贴图的试玩。高风险，可能误伤图集或玩法元素，建议先预览再下载。</span>
              </label>
                </div>
              </div>

              <div class="settings-panel" data-settings-panel="text">
                <div class="option-card text-card">
              <label class="option">
                <input id="optForceLanguage" type="checkbox">

    const counterPatterns = [
      { key: "targetStepCount", label: "目标步数", re: /"targetStepCount":\["int",\d+\]/g, replacement: '"targetStepCount":["int",999999]' },
      { key: "cycleStepCount", label: "循环次数", re: /"cycleStepCount":\["int",\d+\]/g, replacement: '"cycleStepCount":["int",999999]' },
      { key: "targetCompleteCount", label: "完成次数", re: /"targetCompleteCount":\["int",\d+\]/g, replacement: '"targetCompleteCount":["int",999999]' },

      { key: "achieveTargetCount", label: "达成目标数", re: /"achieveTargetCount":\["int",\d+\]/g, replacement: '"achieveTargetCount":["int",999999]' },
      { key: "opCount", label: "操作次数", re: /"opCount":\["int",\d+\]/g, replacement: '"opCount":["int",999999]' },

    ];

    function addLog(message) {
      const time = new Date().toLocaleTimeString();
      log.textContent += "\n[" + time + "] " + message;
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function countMatches(content, pattern) {
      const source = pattern instanceof RegExp ? pattern : new RegExp(pattern, "g");
      return (content.match(source) || []).length;
    }

    function findValues(content, key) {
      const re = new RegExp('"' + key + '":\\["(?:int|float|boolean|color|enum)",([^\\]]+)\\]', "g");
      const values = [];
      let match;
      while ((match = re.exec(content))) values.push(match[1]);
      return [...new Set(values)].slice(0, 8);
    }

    function analyze(content, name) {
      const counters = counterPatterns
        .map(item => ({ ...item, count: countMatches(content, item.re), values: findValues(content, item.key) }))
        .filter(item => item.count > 0);

      const redirects = [
        { label: "window.open", count: countMatches(content, /window\.open/g) },
        { label: "mraid.open", count: countMatches(content, /mraid\.open/g) },
        { label: "InstallFullGame", count: countMatches(content, /InstallFullGame/g) },
        { label: "OpenStore/OpenUrl", count: countMatches(content, /OpenStore|openStore|OpenUrl|openUrl/g) }
      ].filter(item => item.count > 0);

      const storeLinks = [
        { label: "iosLink", count: countMatches(content, /iosLink:"[^"]*"/g) },
        { label: "androidLink", count: countMatches(content, /androidLink:"[^"]*"/g) }
      ].filter(item => item.count > 0);

      const directBackground = [
        "MainCameraBackgroundColor",
        "cameraBackgroundColor",
        "backgroundColor"
      ].map(key => ({ key, values: findValues(content, key) })).filter(item => item.values.length > 0);

      const cssBlackCount = countMatches(content, /background(?:-color)?:\s*#000/g);
      const hasCanvas = content.includes("#application-canvas") || content.includes("<canvas");
      const hasDataBlob = content.includes("assets/bundles/-1/data.blob") || content.includes("window.blobs");
      const likelyTextureBackground = hasDataBlob && directBackground.length === 0;
      const textSignals = [
        { label: "多语言文本切换", count: countMatches(content, /MLT_TextSwitch|MLT_ImageSwitch/g) },
        { label: "标题颜色字段", count: countMatches(content, /TextTitleImageColor|titleColor/g) },
        { label: "文本/图片资源包", count: countMatches(content, /TextMeshPro|font|sprite|atlas/gi) }
      ].filter(item => item.count > 0);

      return { counters, redirects, storeLinks, directBackground, cssBlackCount, hasCanvas, hasDataBlob, likelyTextureBackground, textSignals };
    }

    function renderFiles() {
      if (!inputs.length) {
        fileList.innerHTML = '<div class="file-card"><div class="meta">还没有导入文件。</div></div>';
        return;
      }

      fileList.innerHTML = inputs.map(item => `
        <div class="file-card">
          <div class="file-name">${escapeHtml(item.file.name)}</div>
          <div class="meta">${(item.file.size / 1024).toFixed(1)} KB · 已完成检测</div>
        </div>
      `).join("");
    }

    function makeDetectCard(title, status, detail, tone) {
      return `
        <div class="detect-card">
          <div class="detect-top">
            <div class="detect-title">${escapeHtml(title)}</div>
            <span class="badge ${tone || ""}">${escapeHtml(status)}</span>
          </div>
          <div class="detail">${detail}</div>
        </div>
      `;
    }

    function renderDetection() {
      const cards = [];
      let found = 0;
      let anyTextureBg = false;
      let anyRedirect = false;
      let anyCounters = false;

      for (const item of inputs) {
        const a = item.analysis;
        const filePrefix = inputs.length > 1 ? `<strong>${escapeHtml(item.file.name)}</strong><br>` : "";

        if (a.redirects.length) {
          anyRedirect = true;
          found++;
          cards.push(makeDetectCard("跳转平台", "可关闭", filePrefix + a.redirects.map(x => `${escapeHtml(x.label)} × ${x.count}`).join("，"), ""));
        }

        if (a.counters.length) {
          anyCounters = true;
          found++;
          cards.push(makeDetectCard("试玩次数/结束条件", "可延长", filePrefix + a.counters.map(x => `${escapeHtml(x.label)} ${escapeHtml(x.key)} = ${escapeHtml(x.values.join(" / "))}`).join("<br>"), ""));
        }

        if (a.storeLinks.length) {
          found++;
          cards.push(makeDetectCard("商店链接", "可清空", filePrefix + a.storeLinks.map(x => `${escapeHtml(x.label)} × ${x.count}`).join("，"), "warn"));
        }

        if (a.directBackground.length || a.cssBlackCount || a.hasCanvas) {
          found++;
          const parts = [];
          if (a.directBackground.length) parts.push("检测到 Unity/相机背景字段：" + a.directBackground.map(x => `${escapeHtml(x.key)} = ${escapeHtml(x.values.join(" / "))}`).join("，"));
          if (a.cssBlackCount) parts.push("检测到 HTML/CSS 黑色背景 × " + a.cssBlackCount);
          if (a.hasCanvas) parts.push("检测到游戏画布，可尝试注入页面背景和 WebGL 清屏色。");
          cards.push(makeDetectCard("背景颜色", a.directBackground.length ? "可直接改" : "可尝试", filePrefix + parts.join("<br>"), a.directBackground.length ? "" : "warn"));
        }

        if (a.likelyTextureBackground) {
          anyTextureBg = true;
          found++;
          cards.push(makeDetectCard("场景背景贴图/材质", "谨慎尝试", filePrefix + "这个试玩像是把背景放在 Unity 资源包 `data.blob` 里，普通背景色可能改不到。贴图替换可能误伤玩法元素，请手动勾选并先看预览。", "warn"));
        }

        if (a.textSignals.length) {
          found++;
          cards.push(makeDetectCard("文案/语言", "需要拆资源", filePrefix + a.textSignals.map(x => `${escapeHtml(x.label)} × ${x.count}`).join("，") + "<br>这类通常不是 DOM 文本，常见情况是多语言图集或 Unity 文本组件。", "neutral"));
        }
      }

      optRedirect.checked = anyRedirect || inputs.length > 0;
      optCounters.checked = anyCounters || inputs.length > 0;
      optTextureReplace.checked = false;
      if (anyTextureBg) optBackground.checked = true;

      detectCount.textContent = found + " 项";
      detectList.innerHTML = cards.length ? cards.join("") : '<div class="detect-card"><div class="detail">没有检测到常见可修改项。可以把文件发给我继续深挖。</div></div>';
      generateBtn.disabled = inputs.length === 0;

    function hexToRgb01(hex) {
      const value = hex.replace("#", "");
      return [0, 2, 4].map(i => Number((parseInt(value.slice(i, i + 2), 16) / 255).toFixed(6)));
    }

    function hexToRgb255(hex) {
      const value = hex.replace("#", "");
      return { r: parseInt(value.slice(0, 2), 16), g: parseInt(value.slice(2, 4), 16), b: parseInt(value.slice(4, 6), 16), a: 255 };

        const color = bgColor.value;
        const useTexture = mode === "texture" && !!textureDataUrl;
        content = removePatchById(content, "codex-playable-background");
        content = removePatchById(content, "codex-background-layer");
        content = removePatchById(content, "codex-background-layer-script");
        content = removePatchById(content, "codex-force-webgl-background");
        content = removePatchById(content, "codex-replace-bg-texture");
        content = content.replace(/<script\s+data-background-safe-webgl-patch[\s\S]*?<\/script>/g, "");
        let injection = makeBackgroundPatch(mode, color, textureDataUrl) + makeWebGLBackgroundPatch(mode, color, textureDataUrl);
        if (optTextureReplace.checked) injection += makeTextureReplacementPatch(mode, color, textureDataUrl);
        content = injectIntoHead(content, injection);
        if (mode === "texture" && textureDataUrl) {
          // 图片背景使用“页面背景 + 透明 WebGL 相机”的兼容模式，只改相机背景，不再泛改 backgroundColor，避免误伤瓶子/液体材质。
          content = patchUnityCameraBackgroundTransparent(content);
        } else {
          content = patchUnityBackgroundColor(content, color, false);
          content = patchCssFallbackBackgrounds(content, color, false);
        }
        stats.push(optTextureReplace.checked ? "背景/贴图替换已启用" : (useTexture ? "背景图片已修改（兼容模式）" : "背景颜色已修改"));
      }

      if (optForceLanguage.checked) {
        content = removePatchById(content, "codex-force-language");
        content = injectIntoHead(content, makeLanguagePatch(languageSelect.value));
        stats.push("语言已强制为 " + languageSelect.value);
      }

      content = removePatchById(content, "codex-text-mask");
      content = removePatchById(content, "codex-text-mask-raise");
      content = removePatchById(content, "codex-overlay-text");
      content = removePatchById(content, "codex-overlay-text-fit");
      if (optHideTextColor.checked) {
        const before = content;
        content = patchTextColors(content);
        stats.push(before === content ? "未找到可透明化文案字段" : "文案字段已透明化");
      }

      if (optTextMask.checked) {
        content = injectBeforeBody(content, makeTextMaskPatch(overlaySize.value, textMaskColor.value, textMaskHeight.value));
        stats.push("顶部旧文案遮罩已添加");
      }

      if (optOverlayText.checked && overlayText.value.trim()) {
        content = injectBeforeBody(content, makeOverlayTextPatch(overlayText.value.trim(), overlayColor.value, overlaySize.value, optCenterTextInMask.checked));
        stats.push("覆盖文案已添加");
      }

      if (optRedirect.checked) {
        content = removePatchById(content, "codex-disable-playable-redirects");
        content = injectIntoHead(content, makeRuntimePatch());
        stats.push("跳转已拦截");
      }

      return { content, stats: [...new Set(stats)] };
    }

    function outputName(name) {
      return name.replace(/(\.html?|)$/i, "_modified$1");
    }

    async function processFiles(files) {
      const htmlFiles = [...files].filter(file => /\.html?$/i.test(file.name));
      if (!htmlFiles.length) {
        addLog("没有找到 HTML 文件。");
        return;
      }

      for (const file of htmlFiles) {
        const text = await file.text();
        inputs.push({ file, text, analysis: analyze(text, file.name) });
        addLog("已检测: " + file.name);
      }

      renderFiles();
      renderDetection();
    }

    function clearPreview() {
      previewTitle.textContent = "预览窗口";
      previewFrame.removeAttribute("src");
      previewFrame.hidden = true;
      previewEmpty.hidden = false;
      openPreviewBtn.disabled = true;
      openPreviewBtn.removeAttribute("data-url");
      largePreviewBtn.disabled = true;
      largePreviewBtn.removeAttribute("data-url");
      largePreviewBtn.removeAttribute("data-name");
      modalPreviewFrame.removeAttribute("src");
      previewModal.hidden = true;
    }

    function showPreview(index) {
      const item = outputs[index];
      if (!item) {
        clearPreview();
        return;
      }
      previewTitle.textContent = "预览: " + item.name;
      previewFrame.src = item.url;
      previewFrame.hidden = false;
      previewEmpty.hidden = true;
      openPreviewBtn.disabled = false;
      openPreviewBtn.dataset.url = item.url;
      largePreviewBtn.disabled = false;
      largePreviewBtn.dataset.url = item.url;
      largePreviewBtn.dataset.name = item.name;
      addLog("正在预览: " + item.name);
    }

    function setPreviewMode(mode) {
      previewPanel.classList.remove("landscape", "fit");
      if (mode === "landscape") previewPanel.classList.add("landscape");
      if (mode === "fit") previewPanel.classList.add("fit");
      document.querySelectorAll(".viewport-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function updateModalPreviewSize() {
      const width = modalPreviewWidth.value;
      const height = modalPreviewHeight.value;
      modalPreviewWidthValue.textContent = width;
      modalPreviewHeightValue.textContent = height;
      previewModal.style.setProperty("--modal-preview-w", width + "px");
      previewModal.style.setProperty("--modal-preview-h", height + "px");
    }

    function setModalPreset(width, height) {
      modalPreviewWidth.value = width;
      modalPreviewHeight.value = height;
      updateModalPreviewSize();
    }

    function openLargePreview() {
      const url = largePreviewBtn.dataset.url;
      if (!url) return;
      modalPreviewTitle.textContent = "放大预览: " + (largePreviewBtn.dataset.name || "");
      modalPreviewFrame.src = url;
      updateModalPreviewSize();
      previewModal.hidden = false;
    }

    function closeLargePreview() {
      previewModal.hidden = true;
      modalPreviewFrame.removeAttribute("src");
    }

    function clearOutputs() {
      for (const item of outputs) URL.revokeObjectURL(item.url);
      outputs.length = 0;
      resultList.innerHTML = '<div class="result-card"><div class="meta">生成后的下载链接会显示在这里。</div></div>';
      downloadAllBtn.disabled = true;
      clearPreview();
    }

    function renderOutputs() {
      if (!outputs.length) {
        resultList.innerHTML = '<div class="result-card"><div class="meta">还没有生成文件。</div></div>';
        return;
      }

      resultList.innerHTML = outputs.map((item, index) => `
        <div class="result-card">
          <div class="file-name">${escapeHtml(item.sourceName)}</div>
          <div class="meta">输出: ${escapeHtml(item.name)} · ${(item.size / 1024).toFixed(1)} KB</div>
          <div style="margin:8px 0">${item.stats.map(x => `<span class="badge">${escapeHtml(x)}</span>`).join(" ")}</div>
          <div class="result-actions">
            <button class="secondary preview-btn" type="button" data-index="${index}">预览</button>
            <a class="download" href="${item.url}" download="${escapeHtml(item.name)}">下载</a>
          </div>
        </div>
      `).join("");
    }

    function generate() {
      clearOutputs();

      if (!inputs.length) {
        addLog("请先导入 HTML。");
        return;
      }

      for (const item of inputs) {
        const result = transform(item.text);
        const blob = new Blob([result.content], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        outputs.push({
          sourceName: item.file.name,
          name: outputName(item.file.name),
          size: blob.size,
          url,
          stats: result.stats.length ? result.stats : ["未应用修改"]
        });
        addLog("已生成: " + outputName(item.file.name));
      }

      renderOutputs();
      downloadAllBtn.disabled = outputs.length === 0;
      if (outputs.length) showPreview(0);
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    dropzone.addEventListener("dragover", event => {
      event.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", event => {
      event.preventDefault();
      dropzone.classList.remove("dragover");
      processFiles(event.dataTransfer.files);
    });

    fileInput.addEventListener("change", event => {
      processFiles(event.target.files);
      fileInput.value = "";
    });

    textureInput.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        textureDataUrl = await readFileAsDataUrl(file);
        textureName.textContent = file.name;
        bgPreview.style.backgroundImage = `url("${textureDataUrl}")`;
        optBackground.checked = true;
        optTextureReplace.checked = false;
        document.querySelector('input[name="bgMode"][value="texture"]').checked = true;
        updateBackgroundModeUI();
        addLog("已载入背景图片: " + file.name);
      } catch (error) {
        textureDataUrl = "";
        textureName.textContent = "读取失败";
        addLog("背景图片读取失败: " + error.message);
      }
    });

    bgColor.addEventListener("input", () => {
      bgPreview.style.backgroundColor = bgColor.value;
    });

    document.querySelectorAll('input[name="bgMode"]').forEach(input => {
      input.addEventListener("change", updateBackgroundModeUI);
    });

    updateBackgroundModeUI();

    optTextureReplace.addEventListener("change", () => {
      if (optTextureReplace.checked) optBackground.checked = true;
    });

    function switchSettingsTab(tabName) {
      document.querySelectorAll(".settings-tab").forEach(button => {
        const active = button.dataset.settingsTab === tabName;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      });
      document.querySelectorAll(".settings-panel").forEach(panel => {
        panel.classList.toggle("active", panel.dataset.settingsPanel === tabName);
      });
    }

    document.querySelectorAll(".settings-tab").forEach(button => {
      button.addEventListener("click", () => switchSettingsTab(button.dataset.settingsTab));
    });

    generateBtn.addEventListener("click", generate);

    document.querySelectorAll(".viewport-btn").forEach(button => {
      button.addEventListener("click", () => setPreviewMode(button.dataset.mode));
    });

    resultList.addEventListener("click", event => {
      const button = event.target.closest(".preview-btn");
      if (!button) return;
      showPreview(Number(button.dataset.index));
    });

    openPreviewBtn.addEventListener("click", () => {
      const url = openPreviewBtn.dataset.url;
      if (url) window.open(url, "_blank", "noopener");
    });

    largePreviewBtn.addEventListener("click", openLargePreview);
    closePreviewModalBtn.addEventListener("click", closeLargePreview);
    modalPreviewWidth.addEventListener("input", updateModalPreviewSize);
    modalPreviewHeight.addEventListener("input", updateModalPreviewSize);
    modalPortraitBtn.addEventListener("click", () => setModalPreset(405, 720));
    modalLandscapeBtn.addEventListener("click", () => setModalPreset(960, 540));
    previewModal.addEventListener("click", event => {
      if (event.target === previewModal) closeLargePreview();
    });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && !previewModal.hidden) closeLargePreview();
    });

    downloadAllBtn.addEventListener("click", () => {
      for (const item of outputs) {
        const link = document.createElement("a");
        link.href = item.url;
        link.download = item.name;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }
    });

    clearBtn.addEventListener("click", () => {
      inputs.length = 0;
      clearOutputs();
      renderFiles();
      detectList.innerHTML = '<div class="detect-card"><div class="detail">导入 HTML 后，这里会显示跳转、次数、背景、文案/语言等可修改点。</div></div>';
      detectCount.textContent = "0 项";
      generateBtn.disabled = true;
      log.textContent = "等待文件。";
    });
  </script>
</body>
</html>
